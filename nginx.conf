server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Assets estáticos com cache longo (Vite gera nomes com hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Bloqueia acesso a arquivos .env e dotfiles
    location ~ /\. {
        return 404;
    }

    # SPA routing: qualquer rota serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tipos MIME para ES modules
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        font/woff2                            woff2;
        font/woff                             woff;
        application/pdf                       pdf;
    }
}
