name: Kingdom Portal CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build
        # Vite carrega .env.production no build (https://api.kingdombr.com.br/api)

      - name: Garantir staticwebapp.config.json no dist
        run: |
          if [ ! -f dist/staticwebapp.config.json ]; then
            cp staticwebapp.config.json dist/staticwebapp.config.json
          fi

      - name: Deploy para Azure Static Web App
        if: github.event_name == 'push'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'dist'
          api_location: ''
          output_location: ''
          skip_app_build: true
